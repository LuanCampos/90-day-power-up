# Deploy estático para GitHub Pages (Vite).
# URL típica: https://<usuario>.github.io/<nome-do-repo>/
#
# Repositório especial username.github.io (site na raiz): no job "Build",
# troque o run de build para apenas `npm run build` (base "/") e remova
# GITHUB_PAGES_BASE do env se não for usar.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Caminho base do site em projeto: /<nome-do-repositório>/
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build -- --base="${GITHUB_PAGES_BASE}"

      - name: SPA fallback (GitHub Pages)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
